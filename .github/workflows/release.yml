name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  build-and-publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
          - runner: macos-15
            arch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.3'

      - name: Set up Python
        run: uv python install

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust
        run: rustup toolchain install stable

      - name: Import signing certificate
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH
          rm certificate.p12

      - name: Build, sign, and publish DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: make signed ARCH=${{ matrix.arch }} PUBLISH=always

      - name: Save per-arch update metadata for merge
        uses: actions/upload-artifact@v4
        with:
          name: update-metadata-${{ matrix.arch }}
          path: electron/dist/*-mac.yml
          if-no-files-found: error

  merge-update-metadata:
    needs: build-and-publish
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download per-arch update metadata artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: update-metadata-*
          path: yml-artifacts

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Merge update metadata yml files
        run: |
          python3 <<'EOF'
          import collections
          import glob
          import os
          import yaml

          # electron-builder writes <channel>-mac.yml (latest-mac.yml for stable,
          # beta-mac.yml for prerelease tags, etc.). A single build only produces
          # one channel's yml; group by basename so each channel merges independently.
          groups = collections.defaultdict(list)
          for path in glob.glob("yml-artifacts/**/*-mac.yml", recursive=True):
              groups[os.path.basename(path)].append(path)

          if not groups:
              raise SystemExit("no *-mac.yml artifacts found")

          for basename, paths in groups.items():
              merged = None
              seen_urls = set()
              merged_files = []
              # Sort so arm64 is processed first; its top-level fields
              # (path/sha512/releaseDate) become the defaults for legacy clients.
              for path in sorted(paths):
                  with open(path) as f:
                      data = yaml.safe_load(f)
                  if merged is None:
                      merged = dict(data)
                  for entry in data.get("files", []):
                      if entry["url"] not in seen_urls:
                          seen_urls.add(entry["url"])
                          merged_files.append(entry)
              merged["files"] = merged_files
              with open(basename, "w") as f:
                  yaml.safe_dump(merged, f, sort_keys=False, default_flow_style=False)
              with open(basename) as f:
                  print(f"merged {basename}:\n{f.read()}")
          EOF

      - name: Upload merged update metadata to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" *-mac.yml --clobber --repo "${GITHUB_REPOSITORY}"
