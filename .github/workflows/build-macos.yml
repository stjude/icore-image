name: Build macOS

# This workflow is for testing and manual builds.
# For official releases, use the release.yml workflow by pushing a git tag.
# Trigger this manually from the Actions tab when you need to test builds.

on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'unsigned'
        type: choice
        options:
          - unsigned
          - signed

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-15-intel
            arch: x86_64
            arch_label: x64
          - runner: macos-15
            arch: arm64
            arch_label: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          version: '0.10.3'

      - name: Set up Python
        run: uv python install

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Rust
        run: rustup toolchain install stable

      - name: Import signing certificate
        if: inputs.build_type == 'signed'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "" $KEYCHAIN_PATH
          security default-keychain -s $KEYCHAIN_PATH
          echo "$CSC_LINK" | base64 --decode > certificate.p12
          security import certificate.p12 -P "$CSC_KEY_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -s -k "" $KEYCHAIN_PATH
          rm certificate.p12

      - name: Build unsigned DMG
        if: inputs.build_type == 'unsigned'
        run: make ARCH=${{ matrix.arch }}

      - name: Build signed DMG
        if: inputs.build_type == 'signed'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: make signed ARCH=${{ matrix.arch }}

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: icore-${{ matrix.arch_label }}-dmg
          path: icore-${{ matrix.arch_label }}-*.dmg
