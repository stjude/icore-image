{% load static %}
<!DOCTYPE html>
<html>
    <head>
        <title>iCore</title>
        <meta name="csrf_token" content="{{ csrf_token }}">
        <script>
            // Shared by all pages: CSRF token for JSON POSTs.
            function getCsrfToken() {
                return document.querySelector('meta[name="csrf_token"]').getAttribute('content');
            }
        </script>
        <!-- <link rel="icon" href="{% static 'favicon.ico' %}"> -->
        <style>
            /* Disabled Back button: greyed out and non-interactive, but still
               occupies its space so the header layout never shifts. */
            #backButton:disabled { opacity: 0.4; cursor: not-allowed; }
            #backButton:disabled:hover { background-color: transparent; }
        </style>
        <!-- Render-blocking CSS, cached across navigations so paint-holding keeps the
             previous frame and there's no flash. In dev the version is the file's mtime,
             so a `npm run build:css` busts the cache without re-fetching per navigation. -->
        <link href="{% static 'tailwind.min.css' %}{% if icore_dev %}?v={{ css_version }}{% endif %}" rel="stylesheet">
        {% if icore_dev %}
        <!-- Dev: bust the browser cache so JS edits take effect on live reload. -->
        <script src="{% static 'js/filters.js' %}?v={% now 'U' %}"></script>
        <script src="{% static 'js/column_actions.js' %}?v={% now 'U' %}"></script>
        <script src="{% static 'js/form_validation.js' %}?v={% now 'U' %}"></script>
        {% else %}
        <script src="{% static 'js/filters.js' %}"></script>
        <script src="{% static 'js/column_actions.js' %}"></script>
        <script src="{% static 'js/form_validation.js' %}"></script>
        {% endif %}
    </head>
    <body class="bg-gray-100">
        <header class="fixed w-full z-20 p-4 flex bg-white text-white shadow">
            <button id="backButton" onclick="window.history.back()" title="Back" disabled class="my-auto mr-2 px-2 py-1 text-lg text-gray-700 rounded hover:bg-gray-100">←</button>
            <!-- Enable Back only when there's an in-app page to return to. Each history
                 entry is stamped with a monotonically increasing index in its state;
                 the first page of a session gets index 0, so Back stays disabled there
                 and can never strand the app on a blank/redirecting entry. The button is
                 always rendered (starts disabled) so the layout never shifts; this runs
                 during parse so the state is correct at first paint.
                 (window.history.length is unreliable — an Electron startup or the root
                 redirect leaves an entry that inflates it even with nowhere to go back.) -->
            <script>
                (function () {
                    try {
                        var state = window.history.state || {};
                        var idx = typeof state._backIdx === 'number' ? state._backIdx : null;
                        if (idx === null) {
                            idx = parseInt(sessionStorage.getItem('backNavIdx') || '-1', 10) + 1;
                            state._backIdx = idx;
                            window.history.replaceState(state, '');
                        }
                        sessionStorage.setItem('backNavIdx', String(idx));
                        if (idx > 0) document.getElementById('backButton').disabled = false;
                    } catch (e) { /* leave Back disabled on any storage/history error */ }
                })();
            </script>
            <div class="flex-1 text-lg my-auto">
                <a href="/imagineworkflow" class="flex items-center space-x-2">
                    <img id="app-logo" src="{% static 'logo.png' %}" width="50px" height="50px" alt="iCore Logo" class="object-contain">
                    <span class="text-gray-700 font-semibold">iCore</span>
                </a>
            </div>
            <div class="flex-initial my-auto text-sm text-gray-700">
                <a href="/task_list" class="rounded mx-2 px-2 py-1 hover:bg-gray-100 {% if request.path == '/task_list/' %}bg-gray-100{% endif %}">Projects</a>
                <a href="/settings/general" class="rounded mx-2 px-2 py-1 hover:bg-gray-100 {% if request.path == '/settings/general/' %}bg-gray-100{% endif %}">Settings</a>
            </div>
        </header>
        <section class="fixed z-10 w-64 h-screen bg-white shadow text-sm text-gray-700 pt-24" id="sidebar">
            <a href="/imagineworkflow" class="block px-4 py-2 hover:bg-gray-100 {% if request.path == '/imagineworkflow/' %}bg-gray-100{% endif %}">IMAGINE Workflow</a>
            <button type="button" id="advancedToggle" class="w-full flex items-center justify-between px-4 py-2 text-left hover:bg-gray-100">
                <span>Advanced</span>
                <svg id="advancedChevron" class="w-4 h-4 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </button>
            <div id="advancedModules" class="hidden">
                <a href="/imagequery" class="block px-4 py-2 pl-8 hover:bg-gray-100 {% if request.path == '/imagequery/' %}bg-gray-100{% endif %}">Image Query only</a>
                <a href="/imagedeid" class="block px-4 py-2 pl-8 hover:bg-gray-100 {% if request.path == '/imagedeid/' %}bg-gray-100{% endif %}">Image Deidentification only</a>
                <a href="/headerextract" class="block px-4 py-2 pl-8 hover:bg-gray-100 {% if request.path == '/headerextract/' %}bg-gray-100{% endif %}">Image Header Extraction</a>
                <a href="/textdeid" class="block px-4 py-2 pl-8 hover:bg-gray-100 {% if request.path == '/textdeid/' %}bg-gray-100{% endif %}">Text Deidentification</a>
                <a href="/imageexport" class="block px-4 py-2 pl-8 hover:bg-gray-100 {% if request.path == '/imageexport/' %}bg-gray-100{% endif %}">Secure Data Transfer</a>
                <a href="/imagedeidexport" class="block px-4 py-2 pl-8 hover:bg-gray-100 {% if request.path == '/imagedeidexport/' %}bg-gray-100{% endif %}">Image Deidentification / Export</a>
            </div>
        </section>
        <section class="w-full h-screen pt-24 pl-64">
            <div class="max-w-4xl mx-auto mb-10">
                {% block content %}{% endblock %}
            </div>
        </section>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                const advancedToggle = document.getElementById('advancedToggle');
                const advancedModules = document.getElementById('advancedModules');
                const advancedChevron = document.getElementById('advancedChevron');

                function setAdvanced(open) {
                    advancedModules.classList.toggle('hidden', !open);
                    advancedChevron.classList.toggle('-rotate-180', open);
                }

                // Closed by default, but open if the current page is an advanced module.
                setAdvanced(advancedModules.querySelector('.bg-gray-100') !== null);

                advancedToggle.addEventListener('click', () => {
                    setAdvanced(advancedModules.classList.contains('hidden'));
                });

                const inputBoxes = document.querySelectorAll('input[type="text"]');

                // Loop through each input box and attach event listeners
                inputBoxes.forEach((inputBox) => {
                    inputBox.addEventListener('dragover', (event) => {
                        event.preventDefault(); // Allow drop by preventing default behavior
                    });

                    inputBox.addEventListener('drop', async (event) => {
                        event.preventDefault();

                        const file = event.dataTransfer.files[0];
                        if (file) {
                            const fullPath = await window.electronAPI.getPathForFile(file);
                            inputBox.value = fullPath; // Set the full path in the dropped input box
                            
                            // Trigger validation after setting value
                            inputBox.dispatchEvent(new Event('input', { bubbles: true }));
                            inputBox.dispatchEvent(new Event('change', { bubbles: true }));
                        }
                    });
                });
            });
        </script>
    </body>
</html>
